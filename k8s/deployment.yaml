apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-sre-observability
  namespace: default
  labels:
    app: ai-sre-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-sre-observability
  template:
    metadata:
      labels:
        app: ai-sre-observability
    spec:
      containers:
      - name: ai-sre-observability
        image: gcr.io/gen-lang-client-0896070179/ai-sre-observability:latest
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: PRICING_CONFIG_PATH
          value: /config/pricing.yaml
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: ai-sre-observability-config
