apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # AI Requirement Tool (has native /metrics endpoint)
      - job_name: 'ai-requirement-tool'
        static_configs:
          - targets: ['ai-tool-service:80']
        metrics_path: /metrics

      # AI SRE Observability Service (aggregates metrics from all instrumented services)
      # This is the central metrics endpoint that Prometheus should scrape
      - job_name: 'ai-sre-observability'
        static_configs:
          - targets: ['ai-sre-observability.default.svc.cluster.local:8080']
        metrics_path: /metrics
        scrape_interval: 15s
        scrape_timeout: 10s

      # Note: ai-market-studio, rag-service, and ai-gateway send metrics
      # to ai-sre-observability service via SDK. They don't expose their own
      # /metrics endpoints. Prometheus scrapes the aggregated metrics from
      # ai-sre-observability instead.

